<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sample B シルエット線画 | ライトワークSWAN</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600;700;800&family=Klee+One:wght@400;600&family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:"Zen Maru Gothic","Hiragino Sans",sans-serif; background:#fbf8fc; color:#3a3060; min-height:100vh; }
  .sample-label {
    position:fixed; top:14px; left:14px; z-index:50;
    background:rgba(255,255,255,0.9); padding:8px 18px; border-radius:50px;
    font-size:13px; font-weight:700; color:#7b4b9e; letter-spacing:2px;
    box-shadow:0 4px 14px rgba(100,80,140,0.15); font-family:"Klee One",serif;
  }
  .sample-label small{color:#8a7aa0;font-weight:500;font-size:11px;margin-left:8px;}
  .hero {
    position:relative; min-height:100vh;
    background:url('../assets/bg-pale-watercolor.jpeg') center/cover no-repeat;
    display:flex; align-items:center; justify-content:center;
    padding:120px 20px 80px; overflow:hidden;
  }
  .hero::before{
    content:""; position:absolute; inset:0;
    background:radial-gradient(ellipse 70% 70% at 50% 55%, rgba(255,255,255,0.28), transparent 70%);
  }
  .inner{position:relative;z-index:2;max-width:900px;text-align:center;}

  .swan-svg {
    width: 100%; max-width: 520px;
    height:auto; display:block; margin:0 auto 20px;
    filter: drop-shadow(0 10px 22px rgba(120,95,170,0.28));
  }

  .tag {
    display:inline-block; font-family:"Klee One",serif; font-size:14px;
    color:#b86e90; letter-spacing:4px; margin-bottom:14px; font-weight:700;
    text-shadow:0 2px 8px rgba(255,255,255,0.95);
  }
  .tag::before,.tag::after{content:"❁";color:#d49eb8;margin:0 10px;}
  .title{
    font-family:"Zen Maru Gothic",serif; font-size:clamp(30px,6vw,52px);
    font-weight:900; color:#3a2e6e; letter-spacing:6px; line-height:1.2;
    text-shadow:0 2px 12px rgba(255,255,255,0.85); margin-bottom:8px;
  }
  .title .small{font-size:0.6em;color:#7e70b0;letter-spacing:4px;}
  .sub-en{
    font-family:"Klee One",serif; font-size:clamp(12px,2vw,15px);
    letter-spacing:6px; color:#aea4d0; margin-bottom:22px;
    text-shadow:0 1px 6px rgba(255,255,255,0.8);
  }
  .copy{
    font-family:"Klee One","Zen Maru Gothic",serif; font-size:clamp(17px,3vw,22px);
    font-weight:600; color:#3a3060; letter-spacing:3px; line-height:1.7;
    text-shadow:0 2px 10px rgba(255,255,255,0.9);
  }
  .copy .em{color:#b86e90;position:relative;font-weight:700;}
  .copy .em::after{
    content:""; position:absolute; left:-2px; right:-2px; bottom:3px;
    height:7px; background:rgba(255,215,140,0.55); z-index:-1; border-radius:2px;
  }
</style>
</head>
<body>

<div class="sample-label">B. シルエット線画 <small>SVGイラストの白鳥を淡い色で</small></div>

<section class="hero">
  <div class="inner">

    <svg class="swan-svg" viewBox="180 100 840 350" xmlns="http://www.w3.org/2000/svg" aria-label="2羽の白鳥">
      <defs>
        <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#ffffff"/>
          <stop offset="35%" stop-color="#f5edfb"/>
          <stop offset="70%" stop-color="#ddc8ec"/>
          <stop offset="100%" stop-color="#b0a0d0"/>
        </linearGradient>
        <linearGradient id="wing" x1="0.3" y1="0" x2="0.8" y2="1">
          <stop offset="0%" stop-color="#e8e0f5"/>
          <stop offset="30%" stop-color="#c8b8e5"/>
          <stop offset="60%" stop-color="#9a88c8"/>
          <stop offset="100%" stop-color="#7868b0"/>
        </linearGradient>
        <linearGradient id="wingInner" x1="0.5" y1="0" x2="0.5" y2="1">
          <stop offset="0%" stop-color="#f0e8fa"/>
          <stop offset="50%" stop-color="#c8b8e0"/>
          <stop offset="100%" stop-color="#a090c8"/>
        </linearGradient>
        <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur stdDeviation="4" in="SourceAlpha"/>
          <feOffset dx="0" dy="4"/>
          <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
          <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <!-- 左の白鳥 -->
      <g transform="translate(470, 330)" filter="url(#softShadow)">
        <!-- 外側の大きな翼 -->
        <path d="M 0,60 C -60,50 -140,10 -200,-50 C -240,-90 -255,-130 -240,-150 C -220,-165 -180,-160 -140,-140 C -80,-110 -30,-60 -5,0 C 5,30 5,50 0,60 Z" fill="url(#wing)"/>
        <!-- 翼の羽毛ライン -->
        <g stroke="#ffffff" stroke-width="1.4" fill="none" opacity="0.5">
          <path d="M -40,-50 Q -80,-20 -110,10"/>
          <path d="M -70,-80 Q -110,-40 -140,-5"/>
          <path d="M -100,-100 Q -140,-60 -170,-20"/>
          <path d="M -130,-115 Q -170,-80 -195,-45"/>
        </g>
        <!-- 内側の翼 -->
        <path d="M 15,40 C -20,30 -60,10 -85,-20 C -105,-45 -108,-70 -95,-85 C -80,-93 -55,-85 -35,-65 C -10,-40 10,-5 15,40 Z" fill="url(#wingInner)" opacity="0.85"/>
        <!-- 本体 -->
        <path d="M -60,90 C -110,85 -130,60 -130,40 C -130,0 -100,-10 -60,-5 C -20,5 10,10 40,5 C 80,5 100,30 95,60 C 85,90 40,100 0,100 C -25,100 -45,95 -60,90 Z" fill="url(#body)"/>
        <!-- 首のベース -->
        <ellipse cx="30" cy="10" rx="30" ry="25" fill="url(#body)"/>
        <!-- 首 -->
        <path d="M 45,0 C 55,-40 70,-85 85,-125 C 95,-155 100,-175 100,-185" stroke="url(#body)" stroke-width="26" fill="none" stroke-linecap="round"/>
        <path d="M 45,0 C 55,-40 70,-85 85,-125 C 95,-155 100,-175 100,-185" stroke="#ffffff" stroke-width="12" fill="none" stroke-linecap="round" opacity="0.5"/>
        <!-- 頭 -->
        <path d="M 100,-180 C 98,-195 105,-205 118,-205 C 132,-205 138,-198 138,-188 C 138,-178 130,-172 118,-172 C 108,-172 101,-175 100,-180 Z" fill="url(#body)"/>
        <circle cx="128" cy="-190" r="2.5" fill="#2a1a3a"/>
        <circle cx="129" cy="-191" r="0.8" fill="#ffffff"/>
        <!-- くちばし -->
        <path d="M 138,-188 L 172,-183 L 165,-175 L 138,-180 Z" fill="#ec8030"/>
        <path d="M 138,-188 L 172,-183 L 160,-184 Z" fill="#ffaa50"/>
        <path d="M 168,-184 L 174,-183 L 170,-178 Z" fill="#2a1820"/>
      </g>

      <!-- 右の白鳥（左右反転） -->
      <g transform="translate(730, 330) scale(-1, 1)" filter="url(#softShadow)">
        <path d="M 0,60 C -60,50 -140,10 -200,-50 C -240,-90 -255,-130 -240,-150 C -220,-165 -180,-160 -140,-140 C -80,-110 -30,-60 -5,0 C 5,30 5,50 0,60 Z" fill="url(#wing)"/>
        <g stroke="#ffffff" stroke-width="1.4" fill="none" opacity="0.5">
          <path d="M -40,-50 Q -80,-20 -110,10"/>
          <path d="M -70,-80 Q -110,-40 -140,-5"/>
          <path d="M -100,-100 Q -140,-60 -170,-20"/>
          <path d="M -130,-115 Q -170,-80 -195,-45"/>
        </g>
        <path d="M 15,40 C -20,30 -60,10 -85,-20 C -105,-45 -108,-70 -95,-85 C -80,-93 -55,-85 -35,-65 C -10,-40 10,-5 15,40 Z" fill="url(#wingInner)" opacity="0.85"/>
        <path d="M -60,90 C -110,85 -130,60 -130,40 C -130,0 -100,-10 -60,-5 C -20,5 10,10 40,5 C 80,5 100,30 95,60 C 85,90 40,100 0,100 C -25,100 -45,95 -60,90 Z" fill="url(#body)"/>
        <ellipse cx="30" cy="10" rx="30" ry="25" fill="url(#body)"/>
        <path d="M 45,0 C 55,-40 70,-85 85,-125 C 95,-155 100,-175 100,-185" stroke="url(#body)" stroke-width="26" fill="none" stroke-linecap="round"/>
        <path d="M 45,0 C 55,-40 70,-85 85,-125 C 95,-155 100,-175 100,-185" stroke="#ffffff" stroke-width="12" fill="none" stroke-linecap="round" opacity="0.5"/>
        <path d="M 100,-180 C 98,-195 105,-205 118,-205 C 132,-205 138,-198 138,-188 C 138,-178 130,-172 118,-172 C 108,-172 101,-175 100,-180 Z" fill="url(#body)"/>
        <circle cx="128" cy="-190" r="2.5" fill="#2a1a3a"/>
        <circle cx="129" cy="-191" r="0.8" fill="#ffffff"/>
        <path d="M 138,-188 L 172,-183 L 165,-175 L 138,-180 Z" fill="#ec8030"/>
        <path d="M 138,-188 L 172,-183 L 160,-184 Z" fill="#ffaa50"/>
        <path d="M 168,-184 L 174,-183 L 170,-178 Z" fill="#2a1820"/>
      </g>
    </svg>

    <div class="tag">やさしく寄り添う、心の相談</div>
    <h1 class="title">ライトワーク<br><span class="small">SWAN</span></h1>
    <div class="sub-en">LIGHTWORK SWAN</div>
    <p class="copy">心の奥の<span class="em">"本当の声"</span>を、ひもときます</p>
  </div>
</section>

</body>
</html>
