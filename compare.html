<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>デザイン比較 | ライトワークSWAN</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@700;800&family=Klee+One:wght@400;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: "Hiragino Sans", sans-serif;
  background: #f0ebf8;
  color: #3a2e5c;
  padding: 28px 16px 60px;
  min-height: 100vh;
}

h1 {
  text-align: center;
  font-family: "Klee One", serif;
  font-size: 13px;
  letter-spacing: 4px;
  color: #9a8eb8;
  margin-bottom: 6px;
}
.h1-sub {
  text-align: center;
  font-size: 11px;
  color: #b8aed0;
  letter-spacing: 1px;
  margin-bottom: 28px;
}

.cards {
  display: flex;
  flex-direction: column;
  gap: 24px;
  max-width: 480px;
  margin: 0 auto;
}

.card {
  background: white;
  border-radius: 24px;
  overflow: hidden;
  box-shadow: 0 6px 28px rgba(100,80,150,0.13);
}

.card-label {
  text-align: center;
  font-family: "Klee One", serif;
  font-size: 13px;
  letter-spacing: 4px;
  font-weight: 700;
  padding: 13px 16px;
}
.card-a .card-label { background: #ede6f8; color: #7258b0; }
.card-b .card-label { background: #eef5eb; color: #3d6b3a; }

/* ── A案プレビュー（紫テーマ） ── */
.preview-a {
  position: relative;
  height: 200px;
  background: radial-gradient(ellipse 100% 80% at 50% 30%, #e8e0f8 0%, #f5f0fb 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 10px;
  padding: 20px;
  text-align: center;
}
.preview-a .pa-photo {
  width: 72px; height: 72px;
  border-radius: 50%;
  overflow: hidden;
  border: 3px solid white;
  box-shadow: 0 4px 14px rgba(100,80,150,0.2);
  flex-shrink: 0;
}
.preview-a .pa-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
.preview-a .pa-sub {
  font-family: "Shippori Mincho", serif;
  font-size: 11px; color: #7258b0; letter-spacing: 1px;
}
.preview-a .pa-main {
  font-family: "Shippori Mincho", serif;
  font-size: 17px; font-weight: 800;
  color: #3a2e5c; letter-spacing: 3px; line-height: 1.6;
}
.preview-a .pa-main .soft { color: #9278c8; }

/* ── B案プレビュー（水彩画） ── */
.preview-b {
  position: relative;
  height: 200px;
  overflow: hidden;
  background: url('./assets/hero-bg.jpeg') center 45% / cover no-repeat;
}
.preview-b::before {
  content: "";
  position: absolute; inset: 0;
  background: linear-gradient(to right,
    rgba(249,245,236,0.97) 0%,
    rgba(249,245,236,0.90) 38%,
    rgba(249,245,236,0.35) 60%,
    transparent 76%
  );
}
.preview-b .pb-text {
  position: absolute; top: 50%; left: 20px;
  transform: translateY(-50%);
  z-index: 2;
}
.preview-b .pb-sub {
  font-family: "Klee One", serif;
  font-size: 10px; letter-spacing: 1px; color: #5a7a50;
  margin-bottom: 6px;
}
.preview-b .pb-main {
  font-family: "Shippori Mincho", serif;
  font-size: 18px; font-weight: 800;
  color: #2a1e0e; letter-spacing: 3px; line-height: 1.6;
  margin-bottom: 8px;
}
.preview-b .pb-main .soft { color: #a06050; }
.preview-b .pb-brand {
  font-family: "Klee One", serif;
  font-size: 9px; letter-spacing: 2px; color: #7a6a50;
  margin-bottom: 10px;
}
.preview-b .pb-btn {
  display: inline-block;
  background: #3d6b3a; color: white;
  padding: 6px 14px; border-radius: 50px;
  font-size: 9px; font-weight: 700; letter-spacing: 1px;
}

/* ── 全ページを見るボタン ── */
.open-btn {
  display: block;
  text-align: center;
  padding: 18px 16px;
  font-family: "Klee One", serif;
  font-size: 14px;
  letter-spacing: 3px;
  font-weight: 600;
  text-decoration: none;
  transition: background 0.2s;
  border-top: 1px solid rgba(146,120,200,0.12);
}
.card-a .open-btn { color: #7258b0; background: white; }
.card-a .open-btn:active { background: #f5f0fc; }
.card-b .open-btn { color: #3d6b3a; background: white; }
.card-b .open-btn:active { background: #f0f5ee; }
</style>
</head>
<body>

<h1>— デザイン 比較 —</h1>
<p class="h1-sub">タップで全ページを確認できます</p>

<div class="cards">

  <!-- A案 -->
  <div class="card card-a">
    <div class="card-label">A 案</div>
    <div class="preview-a">
      <div class="pa-photo">
        <img src="./assets/swans.jpeg" alt="SWAN">
      </div>
      <div class="pa-sub">うまく言葉にできなくて、いい。</div>
      <div class="pa-main">あなたの魂が、<br>すでに<span class="soft">答えを知っています。</span></div>
    </div>
    <a class="open-btn" href="./index-a.html" target="_blank">A案を全部見る →</a>
  </div>

  <!-- B案 -->
  <div class="card card-b">
    <div class="card-label">B 案</div>
    <div class="preview-b">
      <div class="pb-text">
        <div class="pb-sub">❧ 魂の光を、一緒に取り戻しましょう。</div>
        <div class="pb-main">あなたが、あなたに<br><span class="soft">帰れるように。</span></div>
        <div class="pb-brand">🦢 ライトワークSWAN</div>
        <span class="pb-btn">鑑定のお申し込み ▸</span>
      </div>
    </div>
    <a class="open-btn" href="./index-b.html" target="_blank">B案を全部見る →</a>
  </div>

</div>

</body>
</html>
